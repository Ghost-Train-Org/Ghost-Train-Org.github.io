<script>
document.getElementById("sj-form").addEventListener("submit", function (e) {
    e.preventDefault();
    
    let input = document.getElementById("sj-address").value.trim();
    if (!input) return;

    let finalUrl;
    try {
        finalUrl = new URL(input).toString();
    } catch {
        try {
            const testUrl = new URL("https://" + input);
            if (testUrl.hostname.includes(".") && !testUrl.hostname.includes(" ")) {
                finalUrl = "https://" + input;
            } else { throw new Error(); }
        } catch {
            finalUrl = "https://duckduckgo.com" + encodeURIComponent(input);
        }
    }

    // 1. Show the loading screen overlay
    const loader = document.getElementById('transition-loader');
    const bar = document.getElementById('transition-bar');
    loader.style.display = 'flex';

    // 2. Animate the bar
    let width = 0;
    const interval = setInterval(() => {
        if (width >= 100) {
            clearInterval(interval);
            // 3. FINALLY redirect once the bar is full
            window.location.href = "/active/embed.html?url=" + encodeURIComponent(finalUrl);
        } else {
            width += Math.floor(Math.random() * 20) + 10;
            if (width > 100) width = 100;
            bar.style.width = width + '%';
        }
    }, 200); 
});
</script>

    <script>
        document.getElementById("sj-form").addEventListener("submit", function (e) {
    e.preventDefault();

    let input = document.getElementById("sj-address").value.trim();
    if (!input) return;

    let finalUrl;

    try {
        // Check if it's already a valid URL
        finalUrl = new URL(input).toString();
    } catch {
        try {
            // Try adding https:// and check if hostname has a dot (real domain)
            const testUrl = new URL("https://" + input);
            if (testUrl.hostname.includes(".") && !testUrl.hostname.includes(" ")) {
                finalUrl = "https://" + input;
            } else {
                throw new Error("Not a domain");
            }
        } catch {
            // Treat as search query
            finalUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(input);
        }
    }

    window.location.href = "/active/embed.html?url=" + encodeURIComponent(finalUrl);
});
    </script>
