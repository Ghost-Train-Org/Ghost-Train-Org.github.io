    <script>
        document.getElementById("sj-form").addEventListener("submit", function (e) {
    e.preventDefault();

    let input = document.getElementById("sj-address").value.trim();
    if (!input) return;

    let finalUrl;

    try {
        // Check if it's already a valid URL
        finalUrl = new URL(input).toString();
    } catch {
        try {
            // Try adding https:// and check if hostname has a dot (real domain)
            const testUrl = new URL("https://" + input);
            if (testUrl.hostname.includes(".") && !testUrl.hostname.includes(" ")) {
                finalUrl = "https://" + input;
            } else {
                throw new Error("Not a domain");
            }
        } catch {
            // Treat as search query
            finalUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(input);
        }
    }

    window.location.href = "/active/embed.html?url=" + encodeURIComponent(finalUrl);
});
    </script>
