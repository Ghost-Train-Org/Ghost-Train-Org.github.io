<script>
function openInAboutBlank() {
  const currentUrl = window.location.origin + "/index.html";
  const win = window.open('about:blank', '_blank');

  if (!win) {
    alert("Popup blocked — allow popups to open about blank.");
    return;
  }

  win.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Ghost Train</title>
      <style>
        body {
          margin: 0;
          background: black;
          color: #00ff88;
          font-family: monospace;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
        }

        iframe {
          width: 100%;
          height: 100%;
          border: none;
        }
      </style>
    </head>
    <body>
      <iframe src="${currentUrl}"></iframe>
    </body>
    </html>
  `);

  win.document.close();
}

function openCredits() {
  const win = window.open("", "_blank");

    alert("Popup blocked — allow popups to view credits.");
    return;
  }

  win.document.write(`

    <head>
      <title>Credits</title>
      <style>
        body {
          margin: 0;
          background: black;
          color: #00ff88;
          font-family: monospace;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          text-align: center;
        }

        .box {
          border: 1px solid #00ff88;

        <p>Made by: You</p>
        <p>Powered by HTML + JS</p>

  `);

  win.document.close();
}
</script>
