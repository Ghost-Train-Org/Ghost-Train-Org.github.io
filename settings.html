<!doctype html>
<html>

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"/>
<title>Settings</title>

<link rel="icon" type="image/png" href="sj.png">
<link rel="stylesheet" href="index.css" />
<script src="register-sw.js" defer></script>

<script>
function openCredits() {
  const win = window.open("", "_blank");

  if (!win) {
    alert("Popup blocked — allow popups to view credits.");
    return;
  }

  win.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Credits</title>
      <style>
        body {
          margin: 0;
          background: black;
          color: #00ff88;
          font-family: monospace;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
        }

        .row {
          display: flex;
          gap: 40px;
          font-size: 16px;
          white-space: nowrap;
        }

        .item {
          text-shadow: 0 0 8px #00ff88;
        }
      </style>
    </head>

    <body>
      <div class="row">
        <div class="item">Credits</div>
        <div class="item">Made by: Clutchdemon, Leah, Devvy, Vail, and Lockiney</div>
        <div class="item">HTML + JS</div>
      </div>
    </body>
    </html>
  `);

  win.document.close();
}
function openInAboutBlank() {
const currentUrl = window.location.origin + "/index.html";
const win = window.open('about:blank', '_blank');

if (!win) {
alert("Popup blocked — allow popups to open about blank.");
return;
}

win.document.write(`
     <!DOCTYPE html>
     <html>
     <head>
       <title>Ghost Train</title>
       <style>
         body {
           margin: 0;
           background: black;
           color: #00ff88;
           font-family: monospace;
           display: flex;
           align-items: center;
           justify-content: center;
           height: 100vh;
         }
       </style>
     </head>
     <body>
       <iframe src="${currentUrl}" style="width:100%;height:100%;border:none;"></iframe>
     </body>
     </html>
   `);

win.document.close();
}
</script>
</head>

<body>
<button onclick="openCredits()" 
onmouseover="this.style.background='black'; this.style.color='#00ff88'"
onmouseout="this.style.background='#00ff88'; this.style.color='black'"
style="
  width: 120px;
  height: 40px;
  background:#00ff88;
  color:black;
  border:1.5px solid #00ff88;
  font-family:monospace;
  font-size:13px;
  cursor:pointer;
  border-radius:4px;
  box-shadow:0 0 8px #00ff88;
  display:inline-block;
  white-space:nowrap;
  margin-top:10px;
">
  Credits
</button>
<button onclick="openInAboutBlank()" 
onmouseover="this.style.background='black'; this.style.color='#00ff88'"
onmouseout="this.style.background='#00ff88'; this.style.color='black'"
style="
      width: 120px;
      width: 130px;
     height: 40px;
     background:#00ff88;
     color:black;
     border:1.5px solid #00ff88;
     font-family:monospace;
     font-size:13px;
     cursor:pointer;
     border-radius:4px;
     box-shadow:0 0 8px #00ff88;
     display:inline-block;
     white-space:nowrap;
   ">
Open About Blank
</button>
