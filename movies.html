<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Train | Theater</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:radial-gradient(circle,#000000 0%,#002d1a 100%);
min-height:100vh;
overflow-y:auto;
font-family:monospace;
display:flex;
flex-direction:column;
color:white;
}

.header-wrapper{
text-align:center;
padding:25px 0 10px 0;
}

.header-wrapper h1{
font-size:50px;
text-shadow:0 0 20px #00ff88;
}

.search-container{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.search-bar{
display:flex;
align-items:center;
background:rgba(255,255,255,0.08);
border:1px solid rgba(0,255,136,0.4);
border-radius:30px;
backdrop-filter:blur(12px);
padding:6px;
width:420px;
box-shadow:0 0 15px rgba(0,255,136,0.2);
}

.search-bar input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
padding:10px 14px;
}

.search-bar input::placeholder{
color:#b8ffe3;
}

.search-bar button{
background:#00ff88;
border:none;
border-radius:24px;
padding:10px 18px;
font-weight:bold;
cursor:pointer;
color:#000;
transition:.25s;
}

.search-bar button:hover{
background:#00cc6f;
}

.side-nav{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
width:60px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:40px;
border:1px solid rgba(0,255,136,0.3);
padding:25px 0;
display:flex;
flex-direction:column;
align-items:center;
box-shadow:0 0 25px rgba(0,0,0,0.7);
z-index:1000;
}

.side-nav ul{list-style:none;}
.side-nav li{margin:20px 0;}

.nav-icon{
width:28px;
transition:.3s;
}

.side-nav a:hover .nav-icon{
transform:scale(1.25);
filter:drop-shadow(0 0 10px #00ff88);
}

main{
padding:10px 110px 40px 30px;
display:flex;
flex-direction:column;
gap:30px;
}

#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
z-index:9999;
flex-direction:column;
}

#modal.open{
display:flex;
}

#modal-bar{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:#000;
border-bottom:1px solid rgba(0,255,136,0.3);
flex-shrink:0;
}

#modal-title{
font-size:14px;
color:#00ff88;
letter-spacing:1px;
}

#modal-close{
background:transparent;
border:1px solid rgba(0,255,136,0.5);
color:#00ff88;
font-family:monospace;
font-size:18px;
width:36px;
height:36px;

cursor:pointer;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
}

#modal-close:hover{
background:rgba(0,255,136,0.15);
}

#modal iframe{
flex:1;
width:100%;
border:none;
}

.movie-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:20px;
}

.movie{
cursor:pointer;
transition:.25s;
position:relative;
}

.movie img{
width:100%;
border-radius:12px;
border:2px solid transparent;
transition:.25s;
display:block;
}

.movie:hover img{
border-color:#00ff88;
}

.movie:hover{
transform:scale(1.08);
}

.movie-title{
font-size:11px;
color:#b8ffe3;
margin-top:6px;
text-align:center;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

#load-more{
display:block;
margin:10px auto 0;
background:transparent;
border:1px solid #00ff88;
color:#00ff88;
border-radius:24px;
padding:10px 30px;
font-family:monospace;
font-size:14px;
cursor:pointer;
letter-spacing:1px;
transition:.25s;
}

#load-more:hover{
background:rgba(0,255,136,0.1);
}

</style>
</head>

<body>

<div class="header-wrapper">
  <h1>GHOST THEATER</h1>
</div>

<div class="search-container">
  <div class="search-bar">
    <input id="searchInput" placeholder="Search movies...">
    <button onclick="searchMovies()">Search</button>
  </div>
</div>

<nav class="side-nav">
  <ul>
    <li><a href="index.html"><img src="home.png" class="nav-icon"></a></li>
    <li><a href="games.html"><img src="games.png" class="nav-icon"></a></li>
    <li><a href="movies.html"><img src="movies.png" class="nav-icon" style="filter:drop-shadow(0 0 10px #00ff88) brightness(1.3);"></a></li>
    <li><a href="music.html"><img src="music.png" class="nav-icon"></a></li>
    <li><a href="settings.html"><img src="settings.png" class="nav-icon"></a></li>
  </ul>
</nav>

<main>

  <div class="movie-list" id="movies"></div>
  <button id="load-more" onclick="loadMore()">Load More</button>

</main>

<div id="modal">
  <div id="modal-bar">
    <span id="modal-title"></span>
    <button id="modal-close" onclick="closeModal()">✕</button>
  </div>
  <iframe id="player" allowfullscreen></iframe>
</div>

<script>

const apiKey = "00119ffd2d069c15532a335d74664364";
const moviesEl = document.getElementById("movies");
const player = document.getElementById("player");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const loadMoreBtn = document.getElementById("load-more");

let currentPage = 1;
let isSearching = false;
let searchPage = 1;
let lastQuery = "";

function playMovie(id, title) {
  player.src = `https://vidsrc.me/embed/movie?tmdb=${id}`;
  modalTitle.textContent = title.toUpperCase();
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.remove("open");
  player.src = "";
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

function renderMovies(list) {
  list.forEach(movie => {
    if (!movie.poster_path) return;
    const div = document.createElement("div");
    div.className = "movie";
    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" loading="lazy">
      <div class="movie-title">${movie.title || movie.name || ""}</div>
    `;
    div.onclick = () => playMovie(movie.id, movie.title || movie.name || "Unknown");
    moviesEl.appendChild(div);
  });
}

async function loadMovies() {
  isSearching = false;
  loadMoreBtn.style.display = "block";
  const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&sort_by=popularity.desc&page=${currentPage}`);
  const data = await res.json();
  renderMovies(data.results);
}

async function loadMore() {
  if (isSearching) {
    searchPage++;
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(lastQuery)}&page=${searchPage}`);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      renderMovies(data.results);
    } else {
      loadMoreBtn.textContent = "No more results";
      loadMoreBtn.disabled = true;
    }
  } else {
    currentPage++;
    const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&sort_by=popularity.desc&page=${currentPage}`);
    const data = await res.json();
    renderMovies(data.results);
  }
}

async function searchMovies() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) {
    moviesEl.innerHTML = "";
    currentPage = 1;
    isSearching = false;
    loadMoreBtn.textContent = "Load More";
    loadMoreBtn.disabled = false;
    loadMovies();
    return;
  }
  lastQuery = q;
  searchPage = 1;
  isSearching = true;
  moviesEl.innerHTML = "";
  loadMoreBtn.textContent = "Load More";
  loadMoreBtn.disabled = false;
  const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(q)}&page=1`);
  const data = await res.json();
  renderMovies(data.results);
}

document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") searchMovies();
});

loadMovies();

</script>

</body>
</html>
