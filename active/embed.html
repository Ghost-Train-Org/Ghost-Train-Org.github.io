<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"/>
    <title>Ghost Train | Loading...</title>

    <link rel="icon" type="image/png" href="sj.png">
    
    <style>
        body {
            background-color: #15161a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 0 20px #00ff88;
            font-size: 80px;
            margin: 0 0 30px 0;
        }

        .loader-track {
            width: 300px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 0 auto;
            border: 1px solid rgba(0, 255, 136, 0.2);
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
            transition: width 0.4s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GHOST TRAIN</h1>

        <div class="loader-track">
            <div class="loader-fill" id="progress"></div>
        </div>
    </div>

    <script>
        const bar = document.getElementById('progress');
        let width = 0;

        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
            } else {
                width += Math.floor(Math.random() * 15) + 5;
                if (width > 100) width = 100;
                bar.style.width = width + '%';
            }
        }, 400);
    </script>

    <script src="uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="uv/uv.config.js" charset="UTF-8"></script>
    <script src="register-sw.js"></script>
    <script src="embed.js"></script>
</body>
</html>
